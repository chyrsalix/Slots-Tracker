<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kroshesh · 48 Laws Slot Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; }
  .font-serif-display { font-family: Georgia, 'Times New Roman', serif; }
</style>
</head>
<body class="min-h-screen bg-neutral-900 text-stone-200">

<div class="max-w-md mx-auto px-4 pt-8 pb-16">

  <!-- Header -->
  <div class="flex items-center gap-2 mb-1">
    <span class="text-red-600 text-base">📕</span>
    <span class="text-xs tracking-widest uppercase text-neutral-400">Kroshesh</span>
  </div>
  <h1 class="font-serif-display text-3xl leading-tight mb-1">48 Laws Slot Tracker</h1>
  <p class="text-sm text-neutral-400 mb-6">
    ₱150/set · FREE bookmark · FREE Baby Mushroom Crochet Keychain (₱75 deposit)
  </p>

  <!-- Progress -->
  <div class="mb-8 border border-neutral-700 rounded-lg p-4 bg-neutral-800">
    <div class="flex justify-between items-baseline mb-2">
      <span class="text-sm text-neutral-400">Slots filled</span>
      <span id="filledCount" class="font-serif-display text-xl text-stone-200">0/10</span>
    </div>
    <div class="w-full h-1.5 bg-neutral-700 rounded-full overflow-hidden mb-3">
      <div id="progressBar" class="h-full bg-red-600 transition-all duration-300" style="width:0%"></div>
    </div>
    <div class="flex justify-between items-baseline">
      <span class="text-sm text-neutral-400">Deposits paid</span>
      <span id="depositCount" class="text-sm text-stone-200">0/0</span>
    </div>
  </div>

  <!-- Slots -->
  <div id="slotsContainer" class="space-y-3"></div>

  <!-- Shipping & Payment -->
  <div class="mt-6 border border-neutral-700 rounded-lg p-4 bg-neutral-800">
    <span class="text-xs tracking-wide uppercase text-neutral-400 block mb-3">Shipping & Payment</span>
    <label class="block text-xs text-neutral-400 mb-1">Lalamove details (once all slots are confirmed)</label>
    <input id="lalamoveInput" placeholder="Booking ref / pickup-dropoff notes"
      class="w-full bg-transparent text-sm text-stone-200 placeholder-neutral-600 outline-none border-b border-neutral-700 focus:border-red-600 py-1.5 mb-4" />
    <label class="block text-xs text-neutral-400 mb-1">GCash payment</label>
    <input id="gcashInput" placeholder="GCash number / reference no."
      class="w-full bg-transparent text-sm text-stone-200 placeholder-neutral-600 outline-none border-b border-neutral-700 focus:border-red-600 py-1.5" />
  </div>

  <p class="text-xs text-neutral-500 text-center mt-8 leading-relaxed">
    No cancellations once a keychain design is chosen — made-to-order na siya 🧶
  </p>
  <p id="syncStatus" class="text-xs text-neutral-600 text-center mt-2">connecting…</p>

</div>

<script>
const BIN_ID = "6a5bb650da38895dfe6fbcc2";
const MASTER_KEY = "$2a$10$pqIeh0MDavunm9VSiuwn.eKN/q8C9OaujqN6ruEat.pUNOLlJA5Mi";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const emptySlot = () => ({ name: "", design: "", deposit: false, contact: "" });
const emptyShipping = () => ({ lalamove: "", gcash: "" });

let state = {
  slots: Array.from({ length: 10 }, emptySlot),
  shipping: emptyShipping(),
};
let saving = false;
let lastSavedJSON = "";

async function fetchData() {
  try {
    const res = await fetch(`${API_URL}/latest`, {
      headers: { "X-Master-Key": MASTER_KEY }
    });
    if (!res.ok) throw new Error("fetch failed");
    const data = await res.json();
    const record = data.record || {};
    const incomingJSON = JSON.stringify(record);
    if (incomingJSON !== lastSavedJSON) {
      if (Array.isArray(record.slots) && record.slots.length === 10) {
        state.slots = record.slots;
      }
      if (record.shipping) {
        state.shipping = { ...emptyShipping(), ...record.shipping };
      }
      lastSavedJSON = incomingJSON;
      render();
    }
    document.getElementById("syncStatus").textContent = "synced · refreshes every few seconds";
  } catch (e) {
    document.getElementById("syncStatus").textContent = "connection issue, retrying…";
    console.error(e);
  }
}

async function persist() {
  saving = true;
  document.getElementById("syncStatus").textContent = "saving…";
  try {
    const res = await fetch(API_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": MASTER_KEY
      },
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error("save failed");
    lastSavedJSON = JSON.stringify(state);
    document.getElementById("syncStatus").textContent = "synced · refreshes every few seconds";
  } catch (e) {
    document.getElementById("syncStatus").textContent = "save failed, will retry";
    console.error(e);
  }
  saving = false;
}

function updateSlot(i, field, value) {
  state.slots[i][field] = value;
  render();
  persist();
}

function clearSlot(i) {
  state.slots[i] = emptySlot();
  render();
  persist();
}

function updateShipping(field, value) {
  state.shipping[field] = value;
  persist();
}

function render() {
  const filled = state.slots.filter(s => s.name.trim() !== "").length;
  const depositsPaid = state.slots.filter(s => s.deposit && s.name.trim() !== "").length;

  document.getElementById("filledCount").textContent = `${filled}/10`;
  document.getElementById("progressBar").style.width = `${(filled / 10) * 100}%`;
  document.getElementById("depositCount").textContent = `${depositsPaid}/${filled || 0}`;

  const container = document.getElementById("slotsContainer");
  container.innerHTML = "";

  state.slots.forEach((slot, i) => {
    const isFilled = slot.name.trim() !== "";
    const card = document.createElement("div");
    card.className = `border rounded-lg p-3 transition-colors ${isFilled ? "border-neutral-600 bg-neutral-800" : "border-neutral-800 bg-neutral-900"}`;

    const topRow = document.createElement("div");
    topRow.className = "flex items-center gap-2 mb-2";

    const num = document.createElement("span");
    num.className = "text-xs font-mono text-neutral-500 w-5";
    num.textContent = String(i + 1).padStart(2, "0");
    topRow.appendChild(num);

    const nameInput = document.createElement("input");
    nameInput.value = slot.name;
    nameInput.placeholder = "Buyer name";
    nameInput.className = "flex-1 bg-transparent text-sm text-stone-200 placeholder-neutral-600 outline-none border-b border-transparent focus:border-red-600 py-0.5";
    nameInput.oninput = (e) => updateSlot(i, "name", e.target.value);
    topRow.appendChild(nameInput);

    if (isFilled) {
      const clearBtn = document.createElement("button");
      clearBtn.type = "button";
      clearBtn.className = "text-neutral-500 hover:text-red-600 transition-colors p-1";
      clearBtn.textContent = "✕";
      clearBtn.onclick = () => clearSlot(i);
      topRow.appendChild(clearBtn);
    }

    card.appendChild(topRow);

    if (isFilled) {
      const details = document.createElement("div");
      details.className = "pl-7 space-y-2";

      const contactInput = document.createElement("input");
      contactInput.value = slot.contact;
      contactInput.placeholder = "Contact (FB / number)";
      contactInput.className = "w-full bg-transparent text-xs text-neutral-300 placeholder-neutral-600 outline-none border-b border-transparent focus:border-red-600 py-0.5";
      contactInput.oninput = (e) => updateSlot(i, "contact", e.target.value);
      details.appendChild(contactInput);

      const designRow = document.createElement("div");
      designRow.className = "grid grid-cols-2 gap-2 pt-1";

      ["Hello Kitty", "Black Cat"].forEach((d) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = d;
        const selected = slot.design === d;
        btn.className = `min-w-0 text-xs px-2 py-2.5 rounded-full border transition-colors active:scale-95 truncate ${selected ? "bg-red-600 border-red-600 text-white" : "border-neutral-600 text-neutral-300"}`;
        btn.onclick = () => updateSlot(i, "design", d);
        designRow.appendChild(btn);
      });
      details.appendChild(designRow);

      const depositBtn = document.createElement("button");
      depositBtn.type = "button";
      depositBtn.className = `w-full flex items-center justify-center gap-1 text-xs px-2 py-2.5 rounded-full border transition-colors active:scale-95 mt-2 ${slot.deposit ? "bg-emerald-700 border-emerald-700 text-white" : "border-neutral-600 text-neutral-300"}`;
      depositBtn.innerHTML = `${slot.deposit ? "✓" : "○"} ₱75 deposit`;
      depositBtn.onclick = () => updateSlot(i, "deposit", !slot.deposit);
      details.appendChild(depositBtn);

      card.appendChild(details);
    }

    container.appendChild(card);
  });

  document.getElementById("lalamoveInput").value = state.shipping.lalamove;
  document.getElementById("gcashInput").value = state.shipping.gcash;
}

document.getElementById("lalamoveInput").oninput = (e) => updateShipping("lalamove", e.target.value);
document.getElementById("gcashInput").oninput = (e) => updateShipping("gcash", e.target.value);

render();
fetchData();
setInterval(fetchData, 3000);
</script>

</body>
</html>
